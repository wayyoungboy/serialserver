name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false

env:
  GO_VERSION: '1.25'

jobs:
  # ==================== Tests ====================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test vsp-server
        run: |
          cd vsp-server
          go test -v -race ./...

      - name: Test vsp-client
        run: |
          cd vsp-client
          go test -v -race ./...

      # vsp-windows 测试在 Windows E2E Test job 中运行
      # 因为需要 Windows 特有的 syscall 和 frontend/dist

  # ==================== Server Build ====================
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Server
        run: |
          cd vsp-server
          CGO_ENABLED=1 go build -ldflags="-s -w" -o vsp-server ./cmd

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsp-server-linux
          path: vsp-server/vsp-server

  # ==================== Device Client Build (Linux/Windows) ====================
  build-device-client:
    name: Build Device Client
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Device Client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd vsp-client
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -ldflags="-s -w" -o device-client-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./cmd/device-client

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vsp-client/device-client-${{ matrix.goos }}-${{ matrix.goarch }}*

  # ==================== Device Client Build (macOS - requires CGO) ====================
  build-device-client-darwin:
    name: Build Device Client (macOS)
    runs-on: macos-latest
    needs: [test]
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Device Client
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          cd vsp-client
          go build -ldflags="-s -w" -o device-client-darwin-${{ matrix.goarch }} ./cmd/device-client

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-client-darwin-${{ matrix.goarch }}
          path: vsp-client/device-client-darwin-${{ matrix.goarch }}

  # ==================== Windows E2E Test ====================
  e2e-test-windows:
    name: Windows E2E Test
    runs-on: windows-latest
    needs: [build-server, build-device-client, build-windows-client]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # 下载构建产物
      - name: Download Server Artifact
        uses: actions/download-artifact@v4
        with:
          name: vsp-server-linux
          path: artifacts/server

      - name: Download Device Client (Windows)
        uses: actions/download-artifact@v4
        with:
          name: device-client-windows-amd64
          path: artifacts/client

      - name: Download VSPManager
        uses: actions/download-artifact@v4
        with:
          name: VSPManager-windows
          path: artifacts/vspmanager

      # 构建 Windows server (Linux 构建无法在 Windows 运行)
      - name: Build Windows Server
        run: |
          cd vsp-server
          go build -ldflags="-s -w" -o vsp-server.exe ./cmd

      # 构建测试程序
      - name: Build Test Programs
        run: |
          cd tests/test_programs
          go build -o test_x.exe test_x.go
          go build -o test_y.exe test_y.go

      # 安装 com0com 需要测试签名模式
      - name: Enable Test Signing Mode
        run: |
          bcdedit /set testsigning on

      # 安装 com0com 驱动
      - name: Install com0com Driver
        run: |
          cd com0com
          # 使用 setupc 安装驱动
          ./setupc.exe install - - 2>&1

      # 运行简化版 E2E 测试 (由于 CI 环境限制，使用模拟串口)
      - name: Run E2E Test (Simplified)
        run: |
          Write-Host "E2E Test: 由于 Windows CI 环境限制，com0com 需要重启才能生效"
          Write-Host "运行单元测试替代..."

          # 测试 test_x 和 test_y 编译成功
          cd tests/test_programs
          if (Test-Path test_x.exe) { Write-Host "test_x.exe 构建成功" }
          if (Test-Path test_y.exe) { Write-Host "test_y.exe 构建成功" }

          # 运行 vsp-windows 内部测试
          cd vsp-windows
          go test -v ./...

      # 重置测试签名模式
      - name: Disable Test Signing Mode
        if: always()
        run: |
          bcdedit /set testsigning off

  # ==================== Windows Client Build (Wails) ====================
  build-windows-client:
    name: Build Windows Client
    runs-on: windows-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        run: |
          cd vsp-windows
          wails build -clean

      - name: Package with com0com
        run: |
          cd vsp-windows/build/bin
          Copy-Item -Path "../../../com0com" -Destination "com0com" -Recurse

      - name: Create ZIP
        run: |
          cd vsp-windows/build/bin
          Compress-Archive -Path * -DestinationPath VSPManager-windows-amd64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSPManager-windows
          path: vsp-windows/build/bin/VSPManager-windows-amd64.zip

  # ==================== Release ====================
  create-release:
    name: Create Release
    needs: [test, build-server, build-device-client, build-device-client-darwin, build-windows-client, e2e-test-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display Structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}