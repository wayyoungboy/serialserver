name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false

env:
  GO_VERSION: '1.24'

jobs:
  # ==================== Server Build ====================
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Server
        run: |
          cd vsp-server
          CGO_ENABLED=1 go build -ldflags="-s -w" -o vsp-server ./cmd

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsp-server-linux
          path: vsp-server/vsp-server

  # ==================== Device Client Build (Linux/Windows) ====================
  build-device-client:
    name: Build Device Client
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Device Client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd vsp-client
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -ldflags="-s -w" -o device-client-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./cmd/device-client

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vsp-client/device-client-${{ matrix.goos }}-${{ matrix.goarch }}*

  # ==================== Device Client Build (macOS - requires CGO) ====================
  build-device-client-darwin:
    name: Build Device Client (macOS)
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Device Client
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          cd vsp-client
          go build -ldflags="-s -w" -o device-client-darwin-${{ matrix.goarch }} ./cmd/device-client

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-client-darwin-${{ matrix.goarch }}
          path: vsp-client/device-client-darwin-${{ matrix.goarch }}

  # ==================== Windows Client Build (Wails) ====================
  build-windows-client:
    name: Build Windows Client
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        run: |
          cd vsp-windows
          wails build -clean

      - name: Package with com0com
        run: |
          cd vsp-windows/build/bin
          Copy-Item -Path "../../../com0com" -Destination "com0com" -Recurse

      - name: Create ZIP
        run: |
          cd vsp-windows/build/bin
          Compress-Archive -Path * -DestinationPath VSPManager-windows-amd64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSPManager-windows
          path: vsp-windows/build/bin/VSPManager-windows-amd64.zip

  # ==================== Release ====================
  create-release:
    name: Create Release
    needs: [build-server, build-device-client, build-device-client-darwin, build-windows-client]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display Structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}